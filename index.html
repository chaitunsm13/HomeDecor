<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      color: #202124;
    }

    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 24px;
      gap: 18px;
      font-size: 14px;
    }

    header a {
      text-decoration: none;
      color: #202124;
    }

    header a:hover {
      text-decoration: underline;
    }

    .profile {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #5f6368;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: 120px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 20px;
    }

    .logo {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 30px;
      letter-spacing: -2px;
    }

    .logo span:nth-child(1) { color: #4285f4; }
    .logo span:nth-child(2) { color: #ea4335; }
    .logo span:nth-child(3) { color: #fbbc05; }
    .logo span:nth-child(4) { color: #4285f4; }
    .logo span:nth-child(5) { color: #34a853; }
    .logo span:nth-child(6) { color: #ea4335; }

    .search-box {
      display: flex;
      align-items: center;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0 16px;
      height: 48px;
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
      transition: box-shadow 0.2s ease;
    }

    .search-box:hover,
    .search-box:focus-within {
      box-shadow: 0 1px 8px rgba(32, 33, 36, 0.18);
    }

    .search-icon {
      font-size: 18px;
      color: #9aa0a6;
      margin-right: 12px;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
    }

    .buttons {
      margin-top: 28px;
    }

    .buttons button {
      margin: 6px;
      padding: 10px 18px;
      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      color: #3c4043;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .buttons button:hover {
      border: 1px solid #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

    .result {
      margin-top: 24px;
      font-size: 14px;
      color: #5f6368;
      min-height: 20px;
    }

    footer {
      background: #f2f2f2;
      font-size: 14px;
      color: #70757a;
    }

    .footer-top {
      padding: 15px 30px;
      border-bottom: 1px solid #dadce0;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 15px 30px;
      gap: 12px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .footer-links a {
      text-decoration: none;
      color: #70757a;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <a href="#">Mail</a>
    <a href="#">Images</a>
    <div class="profile"></div>
  </header>
